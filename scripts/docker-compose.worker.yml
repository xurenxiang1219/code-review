version: '3.8'

services:
  # AI 代码审查系统 - Queue Worker
  ai-code-review-worker:
    build:
      context: ..
      dockerfile: scripts/Dockerfile.worker
    container_name: ai-code-review-worker
    restart: unless-stopped
    
    # 环境变量
    environment:
      - NODE_ENV=production
      - LOG_LEVEL=info
      - WORKER_MAX_CONCURRENCY=10
      - WORKER_POLL_INTERVAL=1000
      - WORKER_TASK_TIMEOUT=600000
      - WORKER_SHUTDOWN_TIMEOUT=30000
      - WORKER_HEALTH_CHECK_INTERVAL=30000
      - WORKER_ENABLE_METRICS=true
      
      # 数据库连接
      - DATABASE_URL=mysql://user:password@mysql:3306/ai_code_review
      - REDIS_URL=redis://redis:6379/0
      
      # AI 服务配置
      - AI_PROVIDER=openai
      - AI_MODEL=gpt-4
      - AI_API_KEY=${AI_API_KEY}
      - AI_BASE_URL=${AI_BASE_URL:-}
      
      # Git 服务配置
      - GIT_PROVIDER=github
      - GIT_TOKEN=${GIT_TOKEN}
      - GIT_BASE_URL=${GIT_BASE_URL:-https://api.github.com}
      
      # 通知配置
      - EMAIL_NOTIFICATION_ENABLED=true
      - EMAIL_RECIPIENTS=${EMAIL_RECIPIENTS}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
    
    # 环境变量文件
    env_file:
      - ../.env
      - ../.env.local
    
    # 端口映射（用于健康检查和指标）
    ports:
      - "3001:3001"
    
    # 卷挂载
    volumes:
      - worker_logs:/app/logs
      - /etc/localtime:/etc/localtime:ro
    
    # 网络
    networks:
      - ai-code-review-network
    
    # 依赖服务
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    
    # 健康检查
    healthcheck:
      test: ["CMD", "node", "/app/scripts/health-check.js"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    
    # 资源限制
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    
    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
        labels: "service=ai-code-review-worker"

  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: ai-code-review-mysql
    restart: unless-stopped
    
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=ai_code_review
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    
    ports:
      - "3306:3306"
    
    volumes:
      - mysql_data:/var/lib/mysql
      - ../scripts/sql:/docker-entrypoint-initdb.d:ro
    
    networks:
      - ai-code-review-network
    
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --innodb-buffer-pool-size=512M
      --max-connections=200

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: ai-code-review-redis
    restart: unless-stopped
    
    ports:
      - "6379:6379"
    
    volumes:
      - redis_data:/data
      - ../config/redis.conf:/usr/local/etc/redis/redis.conf:ro
    
    networks:
      - ai-code-review-network
    
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    
    command: redis-server /usr/local/etc/redis/redis.conf
    
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  # 监控和指标收集（可选）
  prometheus:
    image: prom/prometheus:latest
    container_name: ai-code-review-prometheus
    restart: unless-stopped
    profiles:
      - monitoring
    
    ports:
      - "9090:9090"
    
    volumes:
      - ../config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    
    networks:
      - ai-code-review-network
    
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'

  # Grafana 仪表板（可选）
  grafana:
    image: grafana/grafana:latest
    container_name: ai-code-review-grafana
    restart: unless-stopped
    profiles:
      - monitoring
    
    ports:
      - "3000:3000"
    
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    
    volumes:
      - grafana_data:/var/lib/grafana
      - ../config/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ../config/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    
    networks:
      - ai-code-review-network
    
    depends_on:
      - prometheus

# 网络配置
networks:
  ai-code-review-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# 卷配置
volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  worker_logs:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local